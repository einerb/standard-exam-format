<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluaciones en línea .:. Elige tu materia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152238; --ink-soft:#26374f; --page:#e9ebef; --card:#ffffff;
    --gold:#2962ff; --gold-deep:#2979ff; --line:#d7dbe2; --muted:#5c6675;
    --shadow:0 1px 3px rgba(21,34,56,.06), 0 8px 24px rgba(21,34,56,.06);
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:"Montserrat", system-ui, -apple-system, sans-serif; background:var(--page);
    color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased; min-height:100dvh;}
  .serif{font-family:"Montserrat", Georgia, "Times New Roman", serif;}
  .envoltura{max-width:760px; margin:0 auto; padding:52px 20px 60px;}

  .eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-deep);
    font-weight:600; margin-bottom:14px;}
  h1{font-size:30px; line-height:1.15; margin:0 0 10px; font-weight:600; color:var(--ink);}
  .intro{color:var(--muted); font-size:15px; margin:0 0 34px; max-width:52ch;}

  .lista{display:flex; flex-direction:column; gap:14px;}
  .tarjeta{display:block; background:var(--card); border:1px solid var(--line); border-radius:12px;
    box-shadow:var(--shadow); padding:22px 24px; text-decoration:none; color:inherit;
    position:relative; overflow:hidden; transition:transform .1s, box-shadow .15s;}
  .tarjeta::before{content:""; position:absolute; top:0; left:0; bottom:0; width:4px;
    background:linear-gradient(180deg, var(--gold-deep), var(--gold));}
  .tarjeta:hover{transform:translateY(-1px); box-shadow:0 2px 6px rgba(21,34,56,.08), 0 14px 30px rgba(21,34,56,.1);}
  .tarjeta .materia{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--gold-deep);
    font-weight:600; margin-bottom:6px;}
  .tarjeta h2{font-size:19px; margin:0 0 6px; font-weight:600;}
  .tarjeta .descripcion{color:var(--muted); font-size:14px; margin:0 0 12px;}
  .tarjeta .meta{display:flex; gap:16px; flex-wrap:wrap; font-size:13px; color:var(--muted);}
  .tarjeta .meta strong{color:var(--ink); font-weight:600;}
  .flecha{position:absolute; right:22px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:18px;}

  .vacio, .cargando, .error{color:var(--muted); font-size:14.5px; padding:20px 0;}
  .error{color:#c24b33;}

  @media (max-width:560px){
    .envoltura{padding:36px 16px 40px;}
    h1{font-size:25px;}
    .tarjeta{padding:18px 20px;}
    .flecha{display:none;}
  }
</style>
</head>
<body>

<div class="envoltura">
  <div class="eyebrow">Evaluaciones en línea</div>
  <h1 class="serif">Elige la materia de tu examen</h1>
  <p class="intro">Selecciona la evaluación que vas a presentar. Cada examen tiene su propio tiempo, banco de preguntas y lista de estudiantes autorizados.</p>

  <div class="lista" id="lista-examenes">
    <p class="cargando">Cargando lista de exámenes…</p>
  </div>
</div>

<script>
(function(){
  "use strict";
  const cont = document.getElementById("lista-examenes");

  function escapar(t){ const d = document.createElement("div"); d.textContent = String(t); return d.innerHTML; }

  fetch("examenes/registro.json", { cache: "no-store" })
    .then(res => { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
    .then(lista => {
      const activos = (lista || []).filter(e => e.activo !== false);
      if (!activos.length){
        cont.innerHTML = '<p class="vacio">Todavía no hay exámenes publicados.</p>';
        return;
      }
      cont.innerHTML = activos.map(e => `
        <a class="tarjeta" href="examen.html?id=${encodeURIComponent(e.idExamen)}">
          <div class="materia">${escapar(e.materia || "")}</div>
          <h2 class="serif">${escapar(e.titulo || e.idExamen)}</h2>
          ${e.descripcion ? `<p class="descripcion">${escapar(e.descripcion)}</p>` : ""}
          <div class="meta">${e.duracionMinutos ? `<span>Duración: <strong>${escapar(e.duracionMinutos)} min</strong></span>` : ""}</div>
          <span class="flecha">→</span>
        </a>`).join("");
    })
    .catch(() => {
      cont.innerHTML = '<p class="error">No se pudo cargar la lista de exámenes. Intenta recargar la página.</p>';
    });
})();
</script>
</body>
</html>
